services:
  bot:
    build: .
    volumes:
      #- .:/app   # если это включить, затирается папка staticfiles, сгенерированная в Dockerfile
      - ./logs:/app/logs
    #ports:
    #  - 8000:80
    expose:
      - 80  #  установлен в traefik ?

    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
#      default:
#        aliases:
#          - web_internal
      traefik:

    labels: # new
      - "traefik.enable=true"
      - "traefik.http.routers.bot.entrypoints=https"
      - "traefik.http.routers.bot.rule=Host(`old.kik-soft.ru`)"
      - "traefik.http.routers.bot.tls=true"
      - "traefik.http.routers.bot.tls.certresolver=letsEncrypt"
      - "traefik.http.services.bot-service.loadbalancer.server.port=80"
networks:
  traefik:
    name: traefik
    external: true